# ============================================
# DEPTHGUARD - Docker Compose
# ============================================
# Levantar:   docker-compose up
# Background: docker-compose up -d
# Detener:    docker-compose down
# Rebuild:    docker-compose up --build
# Logs:       docker-compose logs -f
# ============================================

services:
  depthguard:
    build: .
    container_name: depthguard
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - MODO_CAMARA=simulada  # Forzar modo simulada en Docker
      - PYTHONUNBUFFERED=1
    volumes:
      # Persistir base de datos fuera del contenedor
      - ./data/database.db:/app/backend/database.db
      # Persistir capturas de fotos
      - ./data/capturas:/app/backend/capturas
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
